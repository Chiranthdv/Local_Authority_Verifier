services:
  mongo:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: mongo:7
    container_name: trustlayer-mongo
    init: true
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: redis:7-alpine
    container_name: trustlayer-redis
    init: true
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mern_net

  backend:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustlayer-backend
    init: true
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: "5001"
      PORT: "5001"
      HOST: "0.0.0.0"
      MONGO_URI: mongodb://mongo:27017/Local_AuthorityV_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_real_env}
      DOCUMENT_ACCESS_SECRET: ${DOCUMENT_ACCESS_SECRET:-change_this_in_real_env}
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5001/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mern_net

  frontend:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trustlayer-frontend
    init: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_HOST: backend
      API_PORT: "5001"
      VITE_API_BASE_URL: "/api"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5173/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - mern_net

volumes:
  mongo_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  mern_net:
    driver: bridge
