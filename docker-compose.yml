services:
  mongo:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: mongo:7
    container_name: trustlayer-mongo
    init: true
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    image: redis:7-alpine
    container_name: trustlayer-redis
    init: true
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mern_net

  backend:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustlayer-backend
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: "5001"
      PORT: "5001"
      HOST: "0.0.0.0"
      MONGO_URI: mongodb+srv://chiranthdv45_db_user:TUXMMWFmQSrXaB7f@cluster0.3exgqc3.mongodb.net/Local_AuthorityV_db?retryWrites=true&w=majority
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_real_env}
      DOCUMENT_ACCESS_SECRET: ${DOCUMENT_ACCESS_SECRET:-change_this_in_real_env}
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - mern_net

  frontend:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trustlayer-frontend
    init: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      API_HOST: backend
      API_PORT: "5001"
      VITE_API_BASE_URL: "/api"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5173/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - mern_net

  # ──────────────────────────────────────────────────────────────────────────
  # Monitoring Stack
  # ──────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: trustlayer-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - mern_net

  grafana:
    image: grafana/grafana:latest
    container_name: trustlayer-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - mern_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: trustlayer-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - mern_net

  # ──────────────────────────────────────────────────────────────────────────
  # SonarQube — Local Code Quality & Security Analysis
  # ──────────────────────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:lts-community
    container_name: trustlayer-sonarqube
    restart: unless-stopped
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - mern_net

volumes:
  mongo_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
  prometheus_data:
  grafana_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  mern_net:
    driver: bridge
