version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: trustlayer-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: trustlayer-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/app
      - CLIENT_URL=http://localhost:5173
      - JWT_SECRET=change_this_in_real_env
      - DOCUMENT_ACCESS_SECRET=change_this_in_real_env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - mern_net

  frontend:
    build:
      context: ./frontend
    container_name: trustlayer-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mern_net

volumes:
  mongo_data:

networks:
  mern_net:
    driver: bridge
