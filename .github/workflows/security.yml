# ============================================================================
# Security Pipeline — Local Authority Verifier
# ============================================================================
# Stages covered:
#   7. Security & Vulnerability Scan (SAST via CodeQL + npm audit)
#   8. Dependency Check (npm audit + Dependabot)
# ============================================================================

name: Security & Dependency Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 7a: CodeQL — Static Application Security Testing (SAST)
  # ──────────────────────────────────────────────────────────────────────────
  codeql-analysis:
    name: "🛡️ CodeQL SAST Analysis"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "🛡️ Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: "🔍 Perform CodeQL analysis"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 7b + 8: npm audit — Dependency Vulnerability Check
  # ──────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: "📦 Dependency Vulnerability Audit"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Backend audit ──
      - name: "📦 Install backend dependencies"
        working-directory: backend
        run: npm ci

      - name: "🔐 Backend — npm audit (high + critical)"
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: "🔐 Backend — npm audit full report"
        working-directory: backend
        run: npm audit --json > ../backend-audit.json || true

      # ── Frontend audit ──
      - name: "📦 Install frontend dependencies"
        working-directory: frontend
        run: npm ci

      - name: "🔐 Frontend — npm audit (high + critical)"
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: "🔐 Frontend — npm audit full report"
        working-directory: frontend
        run: npm audit --json > ../frontend-audit.json || true

      - name: "📊 Upload audit reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            backend-audit.json
            frontend-audit.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 7c: Secret Scanning with Gitleaks
  # ──────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: "🔑 Secret & Credential Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
