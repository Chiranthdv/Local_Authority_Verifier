# ============================================================================
# CI Pipeline — Local Authority Verifier
# ============================================================================
# Stages covered:
#   1. Source Checkout
#   2. Static Code Analysis / Linting
#   3. Unit Testing
#   4. Integration Testing
#   5. Code Coverage Analysis
# ============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 2 & 3: Static Code Analysis / Linting
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Static Analysis & Linting"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend Linting ──
      - name: "📦 Install backend dependencies"
        working-directory: backend
        run: npm ci

      - name: "🔎 Backend — ESLint"
        working-directory: backend
        run: npm run lint

      - name: "✅ Backend — Syntax check (node --check)"
        working-directory: backend
        run: |
          find . -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './tests/*' \
            -not -path './temp/*' \
            -not -path './storage/*' | xargs -I {} node --check {}

      # ── Frontend Linting ──
      - name: "📦 Install frontend dependencies"
        working-directory: frontend
        run: npm ci

      - name: "🔎 Frontend — ESLint"
        working-directory: frontend
        run: npm run lint

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 4: Unit Testing + Stage 6: Code Coverage
  # ──────────────────────────────────────────────────────────────────────────
  unit-test:
    name: "🧪 Unit Testing & Coverage"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend Unit Tests ──
      - name: "📦 Install backend dependencies"
        working-directory: backend
        run: npm ci

      - name: "🧪 Backend — Unit tests with coverage"
        working-directory: backend
        run: npm run test:unit:coverage

      - name: "📊 Upload backend coverage"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

      # ── Frontend Unit Tests ──
      - name: "📦 Install frontend dependencies"
        working-directory: frontend
        run: npm ci

      - name: "🧪 Frontend — Unit tests with coverage"
        working-directory: frontend
        run: npm run test:coverage

      - name: "📊 Upload frontend coverage"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 5: Integration Testing
  # ──────────────────────────────────────────────────────────────────────────
  integration-test:
    name: "🔗 Integration Testing"
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: "📦 Install backend dependencies"
        working-directory: backend
        run: npm ci

      - name: "🔗 Backend — Integration tests"
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-for-ci
          DOCUMENT_ACCESS_SECRET: test-doc-secret-for-ci
          NODE_ENV: test
        run: npm run test:integration

      - name: "📊 Upload integration test results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/coverage/
          retention-days: 14
