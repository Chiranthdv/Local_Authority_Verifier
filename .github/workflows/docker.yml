# ============================================================================
# Docker Pipeline — Local Authority Verifier
# ============================================================================
# Stages covered:
#   9.  Docker Build
#   10. Container Image Scan (Trivy)
#   11. Artifact / Image Push (GitHub Container Registry)
# ============================================================================

name: Docker Build, Scan & Push

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 9: Docker Build + Stage 10: Container Image Scan
  # ──────────────────────────────────────────────────────────────────────────
  build-and-scan:
    name: "🐳 Docker Build & Security Scan"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "🐳 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🔑 Login to GitHub Container Registry"
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🏷️ Set lowercase repo name"
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: "🏷️ Extract Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Stage 9: Docker Build ──
      - name: "🏗️ Build Docker image — ${{ matrix.service.name }}"
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TARGETPLATFORM=linux/amd64

      # ── Stage 10: Container Image Scan (Trivy) ──
      - name: "🔍 Trivy vulnerability scan — ${{ matrix.service.name }}"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service.name }}:sha-${{ env.SHORT_SHA }}
          format: "sarif"
          output: "trivy-${{ matrix.service.name }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: "📤 Upload Trivy scan to GitHub Security"
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.service.name }}.sarif"
          category: "trivy-${{ matrix.service.name }}"

      - name: "📊 Trivy scan table output"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service.name }}:sha-${{ env.SHORT_SHA }}
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"

      # ── Stage 11: Image Push ──
      - name: "📤 Push image to GHCR — ${{ matrix.service.name }}"
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TARGETPLATFORM=linux/amd64
