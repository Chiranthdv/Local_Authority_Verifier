# Production Deployment — requires manual approval
name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true
      rollback:
        description: "Is this a rollback? (true/false)"
        required: false
        default: "false"

permissions:
  contents: read
  packages: read
  deployments: write

env:
  REGISTRY: ghcr.io

jobs:
  approve-production:
    name: "✅ Production Approval Gate"
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: "🔒 Approval confirmed"
        run: echo "✅ Production deployment approved by ${{ github.actor }}"

  deploy-production:
    name: "🚀 Production Deployment"
    runs-on: ubuntu-latest
    needs: approve-production
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "🏷️ Set lowercase repo name"
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: "🔑 Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "📸 Backup current deployment state"
        run: |
          echo "📸 Recording current state for rollback..."
          docker compose -f docker-compose.prod.yml ps --format json > pre-deploy-state.json 2>/dev/null || echo "[]" > pre-deploy-state.json
          echo "PREVIOUS_TAG=$(cat .current-tag 2>/dev/null || echo 'none')" >> $GITHUB_ENV

      - name: "🚀 Deploy to production"
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          DOCUMENT_ACCESS_SECRET: ${{ secrets.PROD_DOC_SECRET }}
        run: |
          echo "🚀 Deploying tag: $IMAGE_TAG (rollback=${{ github.event.inputs.rollback }})"
          BACKEND_IMAGE=ghcr.io/${{ env.REPO_LOWER }}/backend \
          FRONTEND_IMAGE=ghcr.io/${{ env.REPO_LOWER }}/frontend \
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --pull always --wait --timeout 180
          echo "$IMAGE_TAG" > .current-tag
          echo "✅ Production deployed"

      - name: "❤️ Post-deploy health check"
        run: |
          echo "Waiting 30s for services to stabilize..."
          sleep 30
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5001/ || echo "000")
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173/ || echo "000")
          echo "Backend: $BACKEND_STATUS | Frontend: $FRONTEND_STATUS"
          if [ "$BACKEND_STATUS" != "200" ] || [ "$FRONTEND_STATUS" != "200" ]; then
            echo "❌ Health check FAILED — triggering rollback"
            exit 1
          fi
          echo "✅ Health checks passed"

      - name: "🔄 Auto-rollback on failure"
        if: failure()
        env:
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          DOCUMENT_ACCESS_SECRET: ${{ secrets.PROD_DOC_SECRET }}
        run: |
          echo "🔄 Rolling back to previous tag: $PREVIOUS_TAG"
          if [ "$PREVIOUS_TAG" != "none" ]; then
            IMAGE_TAG=$PREVIOUS_TAG docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --pull always --wait --timeout 180
            echo "✅ Rollback complete"
          else
            echo "⚠️ No previous tag found, cannot rollback"
          fi

  production-smoke:
    name: "💨 Production Smoke Test"
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: "📥 Checkout source code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "💨 Smoke test production"
        env:
          STAGING_BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL || 'http://localhost:5001' }}
          STAGING_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL || 'http://localhost:5173' }}
        run: node scripts/smoke-test.js
